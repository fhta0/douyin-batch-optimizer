<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成Chrome插件图标</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        .container {
            background: #f5f5f5;
            padding: 30px;
            border-radius: 10px;
        }
        h1 { color: #667eea; }
        .icon-preview {
            margin: 20px;
            display: inline-block;
        }
        canvas {
            border: 2px solid #ddd;
            border-radius: 10px;
            margin: 10px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #764ba2;
        }
        .instructions {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 抖店批量属性优化助手 - 图标生成器</h1>
        <p>点击下方按钮生成图标，然后右键保存</p>
        
        <div class="instructions">
            <h3>📋 使用说明：</h3>
            <ol>
                <li>点击"生成图标"按钮</li>
                <li>右键点击每个图标，选择"图片另存为..."</li>
                <li>保存到 <code>douyin-batch-optimizer</code> 文件夹</li>
                <li>文件名分别为：icon16.png、icon48.png、icon128.png</li>
            </ol>
        </div>
        
        <button onclick="generateIcons()">生成图标</button>
        
        <div id="icons"></div>
    </div>

    <script>
        function generateIcons() {
            const sizes = [16, 48, 128];
            const container = document.getElementById('icons');
            container.innerHTML = '';
            
            sizes.forEach(size => {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                canvas.style.width = (size * 4) + 'px';
                canvas.style.height = (size * 4) + 'px';
                
                const ctx = canvas.getContext('2d');
                
                // Draw gradient background
                const gradient = ctx.createLinearGradient(0, 0, size, size);
                gradient.addColorStop(0, '#667eea');
                gradient.addColorStop(1, '#764ba2');
                
                // Draw rounded rectangle
                const radius = size / 6;
                ctx.beginPath();
                ctx.moveTo(radius, 0);
                ctx.lineTo(size - radius, 0);
                ctx.quadraticCurveTo(size, 0, size, radius);
                ctx.lineTo(size, size - radius);
                ctx.quadraticCurveTo(size, size, size - radius, size);
                ctx.lineTo(radius, size);
                ctx.quadraticCurveTo(0, size, 0, size - radius);
                ctx.lineTo(0, radius);
                ctx.quadraticCurveTo(0, 0, radius, 0);
                ctx.closePath();
                
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // Draw text
                ctx.fillStyle = 'white';
                ctx.font = `bold ${size * 0.55}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('抖', size / 2, size / 2 + size / 20);
                
                // Add label
                const label = document.createElement('div');
                label.innerHTML = `<strong>icon${size}.png</strong> (${size}x${size})`;
                label.style.margin = '10px';
                
                const wrapper = document.createElement('div');
                wrapper.className = 'icon-preview';
                wrapper.appendChild(canvas);
                wrapper.appendChild(label);
                
                container.appendChild(wrapper);
            });
            
            // Add download all button
            const downloadBtn = document.createElement('button');
            downloadBtn.textContent = '下载所有图标';
            downloadBtn.onclick = downloadAll;
            container.appendChild(document.createElement('br'));
            container.appendChild(downloadBtn);
        }
        
        function downloadAll() {
            const sizes = [16, 48, 128];
            const canvases = document.querySelectorAll('canvas');
            
            canvases.forEach((canvas, index) => {
                const link = document.createElement('a');
                link.download = `icon${sizes[index]}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
