<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抖店批量优化助手(设置中心)-v1.0.1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 360px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f766e 0%, #2563eb 100%);
      color: #f8fafc;
    }

    .header {
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: 17px;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 0;
    }

    .card {
      background: rgba(15, 23, 42, 0.34);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.18);
      backdrop-filter: blur(10px);
    }

    .field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field label {
      font-size: 13px;
      color: rgba(248, 250, 252, 0.9);
      flex: 1;
    }

    .input,
    .select {
      width: 112px;
      padding: 7px 10px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: #f8fafc;
      font-size: 13px;
      outline: none;
    }

    .input::placeholder,
    .select::placeholder {
      color: rgba(226, 232, 240, 0.72);
    }

    .input:focus,
    .select:focus {
      border-color: rgba(191, 219, 254, 0.92);
      box-shadow: 0 0 0 3px rgba(191, 219, 254, 0.16);
    }

    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.24);
      transition: 0.2s ease;
      cursor: pointer;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: #fff;
      transition: 0.2s ease;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.18);
    }

    .switch input:checked + .slider {
      background: #60a5fa;
    }

    .switch input:checked + .slider::before {
      transform: translateX(20px);
    }

    .section-note {
      font-size: 12px;
      color: rgba(226, 232, 240, 0.8);
      line-height: 1.6;
    }

    .advanced-toggle {
      width: 100%;
      border: none;
      background: transparent;
      padding: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 700;
      color: #f8fafc;
      cursor: pointer;
    }

    .advanced-body {
      margin-top: 10px;
    }

    .advanced-body[hidden] {
      display: none;
    }

    .link-btn {
      border: none;
      background: rgba(255, 255, 255, 0.14);
      color: #eff6ff;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .card-actions {
      padding-top: 10px;
      padding-bottom: 10px;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.14);
      color: #f8fafc;
    }

    .btn-primary {
      background: rgba(255, 255, 255, 0.94);
      color: #2563eb;
    }

    .btn:hover,
    .link-btn:hover {
      filter: brightness(1.04);
    }

    .status {
      font-size: 12px;
      color: #dcfce7;
      margin-top: 6px;
      line-height: 1.4;
    }

    .status:empty {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>抖店批量优化助手(设置中心)-v1.0.1</h1>
  </div>

  <div class="card">
    <div class="field">
      <label for="batchTargetCount">批次大小</label>
      <input class="input" id="batchTargetCount" type="number" min="1" max="500">
    </div>
  </div>

  <div class="card">
    <div class="field" style="margin-bottom: 6px;">
      <label>优化项</label>
    </div>
    <div class="field">
      <label for="attributeOptimizeEnabled">属性优化（批量）</label>
      <label class="switch">
        <input type="checkbox" id="attributeOptimizeEnabled">
        <span class="slider"></span>
      </label>
    </div>
    <div class="field">
      <label for="qualityOptimizeEnabled">图文优化（包括主图3:4、主图视频）</label>
      <label class="switch">
        <input type="checkbox" id="qualityOptimizeEnabled">
        <span class="slider"></span>
      </label>
    </div>
    <div class="section-note">说明：勾选图文优化后，处理完成将自动发布商品</div>
  </div>

  <div class="card">
    <button class="advanced-toggle" id="advancedToggle" type="button">
      <span>高级设置</span>
      <span id="advancedArrow">∨</span>
    </button>
    <div class="advanced-body" id="advancedBody" hidden>
      <div class="field">
        <label for="intervalSeconds">批间间隔(秒)</label>
        <input class="input" id="intervalSeconds" type="number" min="1" max="20">
      </div>
      <div class="field">
        <label for="maxRetries">重试次数</label>
        <input class="input" id="maxRetries" type="number" min="0" max="20">
      </div>
      <div class="field">
        <label for="recordWaitTimeoutSeconds">记录页超时(秒)</label>
        <input class="input" id="recordWaitTimeoutSeconds" type="number" min="30" max="3600">
      </div>
      <div class="field">
        <label for="logRetentionCount">日志保留条数</label>
        <input class="input" id="logRetentionCount" type="number" min="5" max="200">
      </div>
      <div class="field">
        <label for="editorPageTimeoutSeconds">编辑页超时(秒)</label>
        <input class="input" id="editorPageTimeoutSeconds" type="number" min="10" max="120">
      </div>
      <div class="field">
        <label for="generateTimeoutSeconds">生成超时(秒)</label>
        <input class="input" id="generateTimeoutSeconds" type="number" min="10" max="120">
      </div>
      <div class="field">
        <label for="publishTimeoutSeconds">发布超时(秒)</label>
        <input class="input" id="publishTimeoutSeconds" type="number" min="10" max="120">
      </div>
    </div>
  </div>

  <div class="card card-actions">
    <div class="actions">
      <button class="btn btn-secondary" id="resetDefaults" type="button">恢复默认</button>
      <button class="btn btn-primary" id="saveSettings" type="button">保存设置</button>
    </div>
    <div class="status" id="statusText"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
